<!DOCTYPE html>
<html>
<head>
    <title>Traffic Signal Prediction</title>
</head>
<body style="text-align:center; font-family:Arial;">

    <h1>🚦 Traffic Signal Timing Prediction</h1>

    <form action="/predict" method="post">
        <label>Traffic Volume:</label><br>
        <input type="number" name="traffic" required><br><br>

        <label>Average Speed (km/h):</label><br>
        <input type="number" name="speed" required><br><br>

        <label>Hour:</label><br>
        <input type="number" name="hour" required><br><br>

        <button type="submit">Predict</button>
    </form>

    <h2>{{ prediction_text }}</h2>

</body>
</html>
